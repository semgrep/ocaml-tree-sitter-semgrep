name: ABI 15 gating

# Verifies that SEMGREP_ENABLE_ABI15 actually changes the tree-sitter ABI used
# to generate a grammar that ships a tree-sitter.json. See
# lang/scripts/test-abi15-gating and the "tree-sitter ABI 15" section of the
# README.

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  abi15-gating:
    name: lang/scripts/test-abi15-gating
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # The test needs an ABI-15-capable tree-sitter (>= 0.25.0). Download the
      # prebuilt CLI directly so the job stays light (no opam/submodule build).
      # ubuntu-latest already ships a Node.js that `tree-sitter generate` uses.
      - name: Install tree-sitter 0.26.3 CLI
        run: |
          set -euo pipefail
          url=https://github.com/tree-sitter/tree-sitter/releases/download/v0.26.3/tree-sitter-linux-x64.gz
          curl -fsSL "$url" | gunzip > "$RUNNER_TEMP/tree-sitter"
          chmod +x "$RUNNER_TEMP/tree-sitter"
          "$RUNNER_TEMP/tree-sitter" --version

      - name: Run ABI 15 gating test
        env:
          TREE_SITTER_BIN: ${{ runner.temp }}/tree-sitter
        run: ./lang/scripts/test-abi15-gating
